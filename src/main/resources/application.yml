spring:
  application:
    name: ai-friends

  datasource:
    url: jdbc:h2:mem:aifriends;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
    open-in-view: false

# SQL 로그는 JPA가 아닌 P6Spy로만 출력 (바인드 파라미터 치환된 형태)
server:
  port: 8080

# Gemini API (공식 문서: https://ai.google.dev/gemini-api/docs)
# curl 예제와 동일: base-url + /models/{model}:generateContent, 헤더 x-goog-api-key
gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model: ${GEMINI_MODEL}
